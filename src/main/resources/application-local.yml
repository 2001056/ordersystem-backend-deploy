server:
  port: 8080
spring:
  config:
    activate:
      on-profile: local
  application:
    name: ordersystem
  #  아래는 jdbc의 기본 db연결 설정. jdbc뿐만아니라, mybatis,jpa등 spring의 대부분의 db관리기술에서 사용.
  #  스키마는 사전 생성 필요, 테이블의 경우 jdbc/mybatis는 사전생성 필요.
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/ordersystem?useSSL=true
    username: root
    password: test1234
  #    jpa를 사용하기 위한 환경설정
  jpa:
    database: mysql
    #    innoDB를 쓰겠다라는 설정
    database-platform: org.hibernate.dialect.MariaDBDialect
    #    ddl문(테이블생성) 자동생성 여부 : true
    generate-ddl: true
    #    jpa(인터페이스 명세)의 실질적인 구현체는 hibernate
    hibernate:
      #      ddl문 자동생성에 대한 모드(create,update,validate)설정
      #      create : 매번(서버재시작마다)table을 전체 drop후 재생성
      #      update : 엔티티의 변경사항만 alter를 적용. 기존데이터 유지 - 개발서버목적
      #      validate : 실제DB와의 차이점을 check만 하고 ddl문 실행X(콘솔에 변경사항 만 출력) - 운영서버목적
      ddl-auto: create
    #      콘솔창에 ddl,dml 등의 쿼리를 출력하여 보여주는 옵션
    show_sql: true
  servlet:
    multipart:
      max-file-size: 1000MB
      max-request-size: 1000MB
  redis:
    host: localhost
    port: 6379
mybatis:
  mapper-locations: classpath:/mapper/**/*.xml

#logback의 로그레벨 : tracce < debug < info < error 순서
logging:
  level:
    root: info

jwt:
  #  인코딩된 문자 32자 이상 필요.(특수문자) : base64 encoder
  #  beyondaccesstokensecretkeybeyondaccesstokensecretkeybeyondaccesstokensecretkey
  secretKey: YmV5b25kYWNjZXNzdG9rZW5zZWNyZXRrZXliZXlvbmRhY2Nlc3N0b2tlbnNlY3JldGtleWJleW9uZGFjY2Vzc3Rva2Vuc2VjcmV0a2V5
  expiration : 2
  #  인코딩된 문자 32자 이상 필요.(특수문자) : base64 encoder
  #  beyondaccesstokensecretkeybeyondaccesstokensecretkeybeyondaccesstokensecretkey
  secretKeyRt: YmV5b25kYWNjZXNzdG9rZW5zZWNyZXRrZXliZXlvbmRhY2Nlc3N0b2tlbnNlY3JldGtleWJleW9uZGFjY2Vzc3Rva2Vuc2VjcmV0a2V5
  expirationRt: 3000

#aws s3 접근하기 위한 계정생성

aws:
  s3:
    bucket1: leebangbucket
  credentials:
    access-key: xxxxxx
    secret-key: yyyyyy
  region: ap-northeast-2
